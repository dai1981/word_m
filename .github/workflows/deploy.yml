name: Deploy to Lolipop (r-)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: HTML を生成（data/*.json -> word/word/*.html）
        run: python3 generate.py

      - name: ロリポップへ FTP アップロード
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ftp.lolipop.jp
          username: lolipop.jp-dp07302908
          password: 2021eigoduke
          protocol: ftps
          local-dir: ./word/word/
          server-dir: /word/word/
          state-name: .ftp-deploy-r.json   # ★r-専用の状態ファイル（s-とは別名）
